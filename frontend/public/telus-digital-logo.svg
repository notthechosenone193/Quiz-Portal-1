<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 90" width="480" height="90">

  <!-- === SWOOSH ICON === -->

  <!-- Outer large green crescent (top/right shape) -->
  <path
    d="M 6,78
       C 8,60 18,40 40,22
       C 52,14 64,8 76,6
       C 68,12 56,22 46,36
       C 34,52 24,66 20,80 Z"
    fill="#6DC129"/>

  <!-- White stripe between the two swoosh shapes -->
  <path
    d="M 20,80
       C 26,64 38,48 58,32
       C 68,24 78,18 86,15
       C 82,20 72,30 62,44
       C 52,58 44,72 40,83 Z"
    fill="#FFFFFF"/>

  <!-- Inner smaller green crescent (bottom/left shape) -->
  <path
    d="M 40,83
       C 48,68 62,52 82,36
       C 92,28 102,22 110,20
       C 104,26 94,36 82,52
       C 72,66 62,78 58,90 Z"
    fill="#6DC129"/>

  <!-- === TEXT === -->

  <!-- TELUS: very bold, wide, dark purple -->
  <text
    x="122"
    y="68"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="54"
    font-weight="900"
    fill="#4B286D"
    letter-spacing="2">TELUS</text>

  <!-- ® superscript -->
  <text
    x="336"
    y="32"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    font-weight="700"
    fill="#4B286D">®</text>

  <!-- Digital: same purple, lighter weight, slightly smaller -->
  <text
    x="352"
    y="68"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="46"
    font-weight="400"
    fill="#4B286D">Digital</text>

</svg>
